name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: |
          mkdir tmp
          cp AC27Skin.dll tmp/
          cp -r overrides tmp/
          cp README.md tmp/README.txt
          cd tmp && zip -r ../AC27Skin.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: AC27Skin.zip
          body: |
            Download `AC27Skin.zip`, extract to game root.
            See [README](https://github.com/ericpzh/AC27Skin#readme) for full install guide.
