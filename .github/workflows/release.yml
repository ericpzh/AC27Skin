name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PDF
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq pandoc wkhtmltopdf
          pandoc README.md -o README.pdf --pdf-engine=wkhtmltopdf -V margin-top=15 -V margin-bottom=15 -V margin-left=15 -V margin-right=15

      - name: Package
        run: |
          mkdir AC27Skin
          cp AC27Skin.dll AC27Skin/
          cp -r overrides AC27Skin/
          cp README.md README.pdf AC27Skin/
          zip -r AC27Skin.zip AC27Skin/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: AC27Skin.zip
          body: |
            Download `AC27Skin.zip`, extract to game root.
            See [README](https://github.com/ericpzh/AC27Skin#readme) for full install guide.
