name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          echo "tag=build.$COUNT" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Package
        run: |
          mkdir tmp
          cp AC27Skin.dll tmp/
          cp -r overrides tmp/
          cp README.md tmp/README.txt
          cd tmp && zip -r ../AC27Skin.zip .

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          gh release delete "$TAG" --cleanup-tag -y 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" AC27Skin.zip -t "$TAG" -n "Auto release (commit #${{ steps.version.outputs.count }}). Download \`AC27Skin.zip\`, extract to game root. See [README](https://github.com/ericpzh/AC27Skin#readme) for full install guide."
